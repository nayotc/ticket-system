# Remote cloud database configuration.
# Connection details are provided through environment variables and must not be hard-coded.

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?ssl=true&sslmode=require&connectTimeout=10&socketTimeout=10&loginTimeout=10
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate configuration for the cloud database.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.cache.use_second_level_cache=true
spring.jpa.properties.hibernate.cache.use_query_cache=true
spring.jpa.properties.hibernate.cache.region.factory_class=org.hibernate.cache.jcache.JCacheRegionFactory
spring.jpa.properties.hibernate.javax.cache.provider=org.ehcache.jsr107.EhcacheCachingProvider
spring.jpa.properties.hibernate.generate_statistics=false

# Hikari connection pool settings.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.max-lifetime=1800000

# H2 console should not be exposed when running against the cloud database.
spring.h2.console.enabled=false

# Required on cloud — set via environment variables or an external properties file.
jwt.secret=${JWT_SECRET}
external.system.url=${EXTERNAL_SYSTEM_URL}

# Reduce noisy logs when running against the remote cloud database.
logging.level.root=INFO
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.org.hibernate.stat=WARN
logging.level.com.zaxxer.hikari=INFO
logging.level.org.atmosphere=WARN
logging.level.com.vaadin=WARN