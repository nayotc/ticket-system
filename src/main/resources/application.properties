spring.datasource.url=jdbc:h2:mem:ticketsystem;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=false
spring.jpa.properties.hibernate.cache.use_second_level_cache=true
spring.jpa.properties.hibernate.cache.use_query_cache=true
spring.jpa.properties.hibernate.cache.region.factory_class=org.hibernate.cache.jcache.JCacheRegionFactory
spring.jpa.properties.hibernate.javax.cache.provider=org.ehcache.jsr107.EhcacheCachingProvider

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

external.system.url=https://damp-lynna-wsep-1984852e.koyeb.app/

# Initial-state bootstrap is disabled by default.
# It should run only when the "initial-state" Spring profile is explicitly enabled.
ticketsystem.initial-state.enabled=false

# System admin bootstrap.
# The system must always have a system admin, even when the database starts empty.
ticketsystem.system-admin.bootstrap.enabled=true
ticketsystem.system-admin.username=${SYSTEM_ADMIN_USERNAME:admin@example.com}
ticketsystem.system-admin.password=${SYSTEM_ADMIN_PASSWORD:admin123}
ticketsystem.system-admin.full-name=${SYSTEM_ADMIN_FULL_NAME:System Admin}
ticketsystem.system-admin.phone=${SYSTEM_ADMIN_PHONE:0500000000}
ticketsystem.system-admin.birth-date=${SYSTEM_ADMIN_BIRTH_DATE:2001-01-01}