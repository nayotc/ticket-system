spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.cache.use_second_level_cache=true
spring.jpa.properties.hibernate.cache.use_query_cache=false

external.system.url=https://damp-lynna-wsep-1984852e.koyeb.app/
jwt.secret=manual_test_secret_32_chars_long

# Disable startup bootstraps during automated tests.
# Tests should control their own initial data and must not be changed by runtime/demo initializers.
ticketsystem.system-admin.bootstrap.enabled=false
ticketsystem.initial-state.enabled=false

# Test-only values, so Spring can resolve placeholders even when the bootstraps are disabled.
ticketsystem.system-admin.username=admin@example.com
ticketsystem.system-admin.password=test-admin-password
ticketsystem.system-admin.full-name=System Admin
ticketsystem.system-admin.phone=0500000000
